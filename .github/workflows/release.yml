name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build AutoUnzip EXE
        run: powershell -ExecutionPolicy Bypass -File .\build-exe.ps1

      - name: Generate release notes
        run: powershell -ExecutionPolicy Bypass -File .\scripts\generate_release_notes.ps1 -Tag "${{ github.ref_name }}" -OutputPath .\release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: ./release-notes.md
          files: ./dist/AutoUnzip/AutoUnzip.exe
          fail_on_unmatched_files: true
